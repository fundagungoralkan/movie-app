<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOVIEW | 2026 Light Edition</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-decoration"></div>

    <header>
      <div class="header-content">
        <h1 class="logo">MOVIEW<span>.</span></h1>
        <form id="form">
          <div class="search-box">
            <input
              type="text"
              id="search"
              placeholder="Search movies..."
              autocomplete="off"
            />
          </div>
        </form>
      </div>
    </header>

    <div class="hero-text">
      <p class="subtitle">2026 CINEMATIC INTERFACE</p>
      <h1 class="main-title">Discover <span>Extraordinary</span> Stories</h1>
    </div>

    <div class="slider-container" id="sliderContainer">
      <div class="slider-track" id="main"></div>
    </div>

    <button class="close-btn" id="closeBtn">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="3"
      >
        <path d="M18 6L6 18M6 6L18 18" />
      </svg>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
